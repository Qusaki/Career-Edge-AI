version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-api-prod
    restart: always
    ports:
      # Exposes the API on port 80 (standard HTTP) of the EC2 instance
      - "80:8000"
    environment:
      # Pull variables from .env to keep secrets safe
      - DATABASE_URL=${DATABASE_URL}
      # Pass through the API keys from your production server's .env file
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/backend/google-credentials.json
    volumes:
      # Mounts the credentials file from the EC2 host securely into the container
      - ./backend/google-credentials.json:/app/backend/google-credentials.json:ro
